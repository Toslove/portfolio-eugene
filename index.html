<!DOCTYPE html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio-eugene</title>
    <meta
      name="description"
      content="Portfolio - Eugène Tossa | Data Governance & Développement Web"
    />

    <!-- Force le thème sombre immédiatement -->
    <script>
      document.documentElement.setAttribute("data-theme", "dark");
      try {
        localStorage.removeItem("theme");
      } catch (e) {}
    </script>

    <!-- Évite le flash blanc avant le chargement du CSS -->
    <style>
      html, body {
        margin: 0;
        background: #0b0f1a;
        color: #e5e7eb;
      }
    </style>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
